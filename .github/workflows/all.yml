name: all
on:
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'バックテストも実行する(1〜2時間)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  all:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install deps
        run: pip install pywebpush numpy || true
      - name: 1) 品質スコア更新(fundamentals)
        continue-on-error: true
        run: python fundamentals.py
      - name: 2) 価格取得・判定(daily)
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python evaluate.py
      - name: 3) 再分析(reanalyze)
        continue-on-error: true
        run: python reanalyze.py
      - name: 4) バックテスト(任意)
        if: ${{ github.event.inputs.run_backtest == 'true' }}
        continue-on-error: true
        run: python backtest.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "all: 一括更新 $(date -u +%Y-%m-%d)"
          # v3.33.1: 同時書き込み(アプリ同期・🧠レビュー保存・並行workflow)との衝突時は
          # リモートを取り込んで再push(最大5回)。-X theirs=再生側(この実行の生成データ)を優先
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then echo "push失敗(5回衝突)"; exit 1; fi
            echo "push衝突: リモートを取り込んで再試行($n/5)"
            git pull --rebase -X theirs origin main || { git rebase --abort || true; git pull --no-rebase -X ours origin main; }
            sleep 5
          done
