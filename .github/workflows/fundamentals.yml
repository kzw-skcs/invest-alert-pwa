name: fundamentals
on:
  schedule:
    - cron: '0 23 * * 5'   # 毎週土曜 8:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: run fundamentals
        run: python fundamentals.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add fundamentals.json
          git diff --cached --quiet || git commit -m "fundamentals: 品質スコア更新 $(date -u +%Y-%m-%d)"
          # v3.33.1: 同時書き込み(アプリ同期・🧠レビュー保存・並行workflow)との衝突時は
          # リモートを取り込んで再push(最大5回)。-X theirs=再生側(この実行の生成データ)を優先
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then echo "push失敗(5回衝突)"; exit 1; fi
            echo "push衝突: リモートを取り込んで再試行($n/5)"
            git pull --rebase -X theirs origin main || { git rebase --abort || true; git pull --no-rebase -X ours origin main; }
            sleep 5
          done
