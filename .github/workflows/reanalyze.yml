name: reanalyze
on:
  schedule:
    - cron: '0 22 * * 0'   # 毎週日曜 7:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reanalyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: run reanalyze
        run: python reanalyze.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "reanalyze: 的中率検証+自動調整 $(date -u +%Y-%m-%d)"
          git push
