name: daily
on:
  schedule:
    # 米国市場の引け(夏時間=5:00 JST / 冬時間=6:00 JST)に合わせた2本立て。
    # 4〜10月(米夏時間): 20:00 UTC = 5:00 JST
    - cron: '0 20 * 4-10 *'
    # 11〜3月(米冬時間): 21:00 UTC = 6:00 JST(これより早いと引け前の途中値になる)
    - cron: '0 21 * 1-3,11,12 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install deps (push通知用・任意)
        run: pip install pywebpush || true
      - name: run evaluate
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python evaluate.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily: data.json更新 $(date -u +%Y-%m-%d)"
          git push
