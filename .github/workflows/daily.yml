name: daily
on:
  schedule:
    - cron: '0 21 * * *'   # 毎朝 6:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install deps (push通知用・任意)
        run: pip install pywebpush || true
      - name: run evaluate
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python evaluate.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily: data.json更新 $(date -u +%Y-%m-%d)"
          git push
