name: daily

# 毎日 6:00 JST（= 21:00 UTC 前日）に判定を実行
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run evaluation
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python evaluate.py
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json predictions.jsonl subscriptions.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "daily update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "変更なし"
          fi
