name: daily
on:
  schedule:
    # 米国市場の引け(夏時間=5:00 JST / 冬時間=6:00 JST)に合わせた設定。
    # GitHubのcronは遅延・スキップが常態のため、①0分ちょうどを避け ②1時間後にバックアップを置く。
    # 同日2回実行してもevaluate.pyの同日ガードでストリーク二重加算はない(v3.18)。
    # 4〜10月(米夏時間): 20:07 UTC = 5:07 JST + バックアップ 21:07 UTC = 6:07 JST
    - cron: '7 20,21 * 4-10 *'
    # 11〜3月(米冬時間): 21:07 UTC = 6:07 JST + バックアップ 22:07 UTC = 7:07 JST
    - cron: '7 21,22 * 1-3,11,12 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install deps (push通知用・任意)
        run: pip install pywebpush || true
      - name: run evaluate
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python evaluate.py
      - name: commit
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily: data.json更新 $(date -u +%Y-%m-%d)"
          # v3.33.1: 同時書き込み(アプリ同期・🧠レビュー保存・並行workflow)との衝突時は
          # リモートを取り込んで再push(最大5回)。-X theirs=再生側(この実行の生成データ)を優先
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then echo "push失敗(5回衝突)"; exit 1; fi
            echo "push衝突: リモートを取り込んで再試行($n/5)"
            git pull --rebase -X theirs origin main || { git rebase --abort || true; git pull --no-rebase -X ours origin main; }
            sleep 5
          done
